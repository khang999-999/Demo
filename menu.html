const AimEngine = {
    smooth: 0.18,        // độ mượt (thấp = nhanh, cao = mượt)
    maxStep: 25,         // giới hạn kéo mỗi frame
    prediction: 0.35,    // dự đoán chuyển động
    antiShake: 0.12      // giảm rung
};

// vector helper
function vec(x, y) {
    return { x, y };
}

function length(v) {
    return Math.sqrt(v.x * v.x + v.y * v.y);
}

function normalize(v) {
    let len = length(v);
    if (len === 0) return vec(0, 0);
    return vec(v.x / len, v.y / len);
}

function clamp(v, maxLen) {
    let len = length(v);
    if (len > maxLen) {
        let n = normalize(v);
        return vec(n.x * maxLen, n.y * maxLen);
    }
    return v;
}

// 🎯 core aim nâng cấp
function increaseAccuracy(target, current, velocity = vec(0, 0)) {

    // 1. prediction (dự đoán vị trí)
    let predictedTarget = vec(
        target.x + velocity.x * AimEngine.prediction,
        target.y + velocity.y * AimEngine.prediction
    );

    // 2. delta (khoảng cách)
    let delta = vec(
        predictedTarget.x - current.x,
        predictedTarget.y - current.y
    );

    // 3. clamp (giới hạn lực kéo)
    delta = clamp(delta, AimEngine.maxStep);

    // 4. smoothing (làm mượt)
    let smoothDelta = vec(
        delta.x * AimEngine.smooth,
        delta.y * AimEngine.smooth
    );

    // 5. anti-shake (lọc rung nhỏ)
    if (Math.abs(smoothDelta.x) < AimEngine.antiShake) smoothDelta.x = 0;
    if (Math.abs(smoothDelta.y) < AimEngine.antiShake) smoothDelta.y = 0;

    // 6. output vị trí mới
    return vec(
        current.x + smoothDelta.x,
        current.y + smoothDelta.y
    );
}


        function setupAimLock(sensitivity, target, current) {
    // scale theo sensitivity
    let smooth = 0.25 - sensitivity * 0.12;   // càng cao càng bắt nhanh
    let lockStrength = 0.6 + sensitivity * 0.4;
    let antiShake = 0.03 + sensitivity * 0.05;
    let maxStep = 18 + sensitivity * 12;

    // delta
    let dx = target.x - current.x;
    let dy = target.y - current.y;

    // khoảng cách
    let dist = Math.sqrt(dx * dx + dy * dy);

    // clamp (tránh kéo quá lố)
    if (dist > maxStep) {
        dx = (dx / dist) * maxStep;
        dy = (dy / dist) * maxStep;
    }

    // apply lock strength (bám mục tiêu mạnh hơn khi gần)
    let factor = Math.min(1, lockStrength / (dist + 0.001));
    dx *= factor;
    dy *= factor;

    // smoothing (mượt)
    dx *= smooth;
    dy *= smooth;

    // anti-shake (lọc rung nhỏ)
    if (Math.abs(dx) < antiShake) dx = 0;
    if (Math.abs(dy) < antiShake) dy = 0;

    // output
    return {
        x: current.x + dx,
        y: current.y + dy
    };
}

<script>

    // 👇 DÁN Ở ĐÂY
    function startLoading() {
        let bar = document.getElementById("loadingBar");
        let text = document.getElementById("loadingText");
        let box = document.getElementById("loadingBox");

        box.style.display = "block";

        let progress = 0;

        let steps = [
            "Đang kết nối server...",
            "Đang load config...",
            "Injecting data...",
            "Tối ưu hệ thống...",
            "Gần xong rồi..."
        ];

        let interval = setInterval(() => {
            if (progress >= 100) {
                clearInterval(interval);
                text.innerHTML = "Hoàn tất ✅";
            } else {
                progress += Math.random() * 10;
                if (progress > 100) progress = 100;

                bar.style.width = progress + "%";
                bar.innerHTML = Math.floor(progress) + "%";

                if (progress < 20) text.innerHTML = steps[0];
                else if (progress < 40) text.innerHTML = steps[1];
                else if (progress < 60) text.innerHTML = steps[2];
                else if (progress < 80) text.innerHTML = steps[3];
                else text.innerHTML = steps[4];
            }
        }, 200);
    }
</script>

<script>
const features = {
    aimlock: false,
    fixlag: false,
    buffman: false,
    ghimtam: false,
    nhetam: false
};

function toggleFeature(btn, name) {
    features[name] = !features[name];

    if (features[name]) {
        btn.innerText = btn.innerText.replace("OFF", "ON");
        btn.style.background = "#00ff88";
        addLog(name.toUpperCase() + " → ĐÃ BẬT ✅");
    } else {
        btn.innerText = btn.innerText.replace("ON", "OFF");
        btn.style.background = "#ff0033";
        addLog(name.toUpperCase() + " → ĐÃ TẮT ❌");
    }
}

function fakeInject() {
    let steps = [
        "Kết nối server...",
        "Load config...",
        "Injecting data...",
        "Bypass check...",
        "Hook system...",
        "Hoàn tất!"
    ];

    let i = 0;

    let interval = setInterval(() => {
        if (i >= steps.length) {
            clearInterval(interval);
            return;
        }

        addLog(steps[i]);
        i++;
    }, 500);
}

function addLog(text) {
    let box = document.getElementById("logBox");

    let line = document.createElement("div");
    line.innerText = "➤ " + text;

    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
}
</script>
