<script>
const features = {
    aimlock: false,
    fixlag: false,
    buffman: false,
    ghimtam: false,
    nhetam: false
};

function toggleFeature(btn, name) {
    features[name] = !features[name];

    if (features[name]) {
        btn.innerText = btn.innerText.replace("OFF", "ON");
        btn.style.background = "#00ff88";
        addLog(name.toUpperCase() + " → ĐÃ BẬT ✅");
    } else {
        btn.innerText = btn.innerText.replace("ON", "OFF");
        btn.style.background = "#ff0033";
        addLog(name.toUpperCase() + " → ĐÃ TẮT ❌");
    }
}

function fakeInject() {
    let steps = [
        "Kết nối server...",
        "Load config...",
        "Injecting data...",
        "Bypass check...",
        "Hook system...",
        "Hoàn tất!"
    ];

    let i = 0;

    let interval = setInterval(() => {
        if (i >= steps.length) {
            clearInterval(interval);
            return;
        }

        addLog(steps[i]);
        i++;
    }, 500);
}

function addLog(text) {
    let box = document.getElementById("logBox");

    let line = document.createElement("div");
    line.innerText = "➤ " + text;

    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
}
</script>
